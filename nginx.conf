server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  sendfile on;
  tcp_nopush on;
  types_hash_max_size 2048;

  if ($http_x_forwarded_proto = "http") {
    return 308 https://$host$request_uri;
  }

  add_header Cross-Origin-Opener-Policy "same-origin" always;
  add_header Cross-Origin-Embedder-Policy "require-corp" always;
  add_header Cross-Origin-Resource-Policy "same-origin" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "no-referrer" always;
  add_header X-Frame-Options "DENY" always;
  add_header X-Robots-Tag "noindex, noarchive" always;
  add_header Permissions-Policy "camera=(), geolocation=(), microphone=(), payment=()" always;
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
  add_header Content-Security-Policy "default-src 'self'; connect-src 'self' blob:; script-src 'self' blob: 'wasm-unsafe-eval' 'unsafe-eval'; worker-src 'self' blob:; img-src 'self' data: blob:; media-src 'self' blob:; style-src 'self' 'unsafe-inline'; font-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'" always;

  location = /healthz {
    access_log off;
    default_type text/plain;
    add_header Cache-Control "no-store";
    return 200 "advance wars web ok\n";
  }

  location = /version.json {
    default_type application/json;
    add_header Cache-Control "no-store";
    try_files $uri =404;
  }

  location = /game-manifest.json {
    default_type application/json;
    add_header Cache-Control "no-store";
    try_files $uri =404;
  }

  location = /manifest.webmanifest {
    default_type application/manifest+json;
    expires -1;
    try_files $uri =404;
  }

  location ~ ^/(index\.html|service-worker\.js)$ {
    expires -1;
    try_files $uri =404;
  }

  location ^~ /assets/ {
    add_header Cache-Control "public, max-age=0, must-revalidate" always;
    try_files $uri =404;
  }

  location ^~ /emulator/ {
    types {
      application/wasm wasm;
      application/octet-stream data;
      application/javascript js;
      text/css css;
      application/json json;
    }
    expires 30d;
    try_files $uri =404;
  }

  location ^~ /roms/ {
    types { application/octet-stream gba; }
    add_header Cache-Control "private, max-age=0, must-revalidate" always;
    add_header Accept-Ranges "bytes" always;
    add_header X-Robots-Tag "noindex, noarchive" always;
    try_files $uri =404;
  }

  location ^~ /licenses/ {
    default_type text/plain;
    expires 1d;
    try_files $uri =404;
  }

  location ^~ /icons/ {
    expires 30d;
    try_files $uri =404;
  }

  location ~* \.[a-z0-9]{1,12}$ {
    try_files $uri =404;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
